name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from fomod/info.xml
        id: version
        run: |
          VERSION=$(sed -n 's/.*MachineVersion="\([^"]*\)".*/\1/p' fomod/info.xml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release zip
        if: steps.check.outputs.exists == 'false'
        run: |
          zip -r "Simulated-Time-Skip-${{ steps.version.outputs.tag }}.zip" \
            fomod/ core/ optional/

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Simulated Time Skip ${{ steps.version.outputs.tag }}
          files: "Simulated-Time-Skip-${{ steps.version.outputs.tag }}.zip"
          generate_release_notes: true
